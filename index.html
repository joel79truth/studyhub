<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- App icon in browser -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <!-- PWA settings -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Mobile app colors -->
    <meta name="theme-color" content="#0f172a" />

    <title>StudyHub</title>
  </head>

  <body>
    <div id="root"></div>
<script>
  // Catch all unhandled errors and show them on the page
  window.onerror = function (msg, url, line, col, error) {
    document.body.innerHTML = '<div style="color:red;padding:20px;font-size:18px;">❌ JS Error: ' + msg + '<br>At: ' + url + ':' + line + ':' + col + '</div>';
  };
  window.addEventListener('unhandledrejection', function (e) {
    document.body.innerHTML = '<div style="color:red;padding:20px;font-size:18px;">❌ Promise Rejection: ' + e.reason + '</div>';
  });
</script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
